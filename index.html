<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stepwords — Responsive Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100dvh;
    background: #1c1c1e;
    color: #e8e6e1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── toolbar with the three device toggles ── */
  .toolbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 16px;
    flex-wrap: wrap;
  }
  .divider { width: 1px; height: 26px; background: rgba(255,255,255,.1); }
  .seg button .sub { font-size: 10px; opacity: .55; }
  .seg {
    display: inline-flex;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 13px;
    padding: 4px;
    gap: 2px;
  }
  .seg button {
    background: none;
    border: none;
    color: rgba(232,230,225,.55);
    font-family: inherit;
    cursor: pointer;
    padding: 7px 18px;
    border-radius: 9px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    line-height: 1.25;
    transition: background .15s, color .15s;
  }
  .seg button:hover { color: rgba(232,230,225,.85); }
  .seg button .lbl { font-size: 13px; font-weight: 500; }
  .seg button .dim { font-size: 10px; opacity: .55; font-variant-numeric: tabular-nums; }
  .seg button.active { background: #f4f2ea; color: #1c1c1e; }
  .seg button.active .dim { opacity: .6; }

  /* ── stage holds the scaled device window ── */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 0 24px 28px;
  }
  .frame-wrap { position: relative; flex-shrink: 0; }
  #frame {
    position: absolute;
    top: 0;
    left: 0;
    border: none;
    transform-origin: top left;
    border-radius: 16px;
    box-shadow: 0 16px 60px rgba(0,0,0,.55);
    background: #1c1c1e;
  }
</style>
</head>
<body>

  <div class="toolbar">
    <div class="seg" id="ver">
      <button data-src="app-ben.html"><span class="lbl">Ben</span><span class="sub">faithful</span></button>
      <button data-src="app.html" class="active"><span class="lbl">Current</span><span class="sub">trimmed</span></button>
      <button data-src="app-bare.html"><span class="lbl">Bare</span><span class="sub">minimal</span></button>
      <button data-src="app-pixel.html"><span class="lbl">Pixel</span><span class="sub">raccoon</span></button>
    </div>
    <div class="divider"></div>
    <div class="seg" id="seg">
      <button data-w="1280" data-h="800" class="active"><span class="lbl">Desktop</span><span class="dim">1280 × 800</span></button>
      <button data-w="768"  data-h="1024"><span class="lbl">Tablet</span><span class="dim">768 × 1024</span></button>
      <button data-w="390"  data-h="844"><span class="lbl">Mobile</span><span class="dim">390 × 844</span></button>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="frame-wrap" id="wrap">
      <iframe id="frame" src="app.html" title="Stepwords"></iframe>
    </div>
  </div>

<script>
(function () {
  var stage = document.getElementById("stage");
  var wrap  = document.getElementById("wrap");
  var frame = document.getElementById("frame");
  var seg   = document.getElementById("seg");
  var ver   = document.getElementById("ver");
  var cur = { w: 1280, h: 800 };

  function apply(animate) {
    // the iframe's CSS size IS its viewport, so the game's media queries respond to it
    frame.style.width  = cur.w + "px";
    frame.style.height = cur.h + "px";

    // scale down to fit the available stage (never scale up past 1:1)
    var availW = stage.clientWidth;
    var availH = stage.clientHeight;
    var scale = Math.min(1, availW / cur.w, availH / cur.h);

    frame.style.transform = "scale(" + scale + ")";
    // the wrapper takes the scaled footprint so the stage can center it
    wrap.style.width  = (cur.w * scale) + "px";
    wrap.style.height = (cur.h * scale) + "px";
  }

  seg.addEventListener("click", function (e) {
    var btn = e.target.closest("button");
    if (!btn) return;
    var btns = seg.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
    btn.classList.add("active");
    cur = { w: parseInt(btn.dataset.w, 10), h: parseInt(btn.dataset.h, 10) };
    apply();
  });

  // version switcher — swap the iframe to a different version, keep the device size
  ver.addEventListener("click", function (e) {
    var btn = e.target.closest("button");
    if (!btn) return;
    var btns = ver.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
    btn.classList.add("active");
    frame.src = btn.dataset.src;   // load() fires "load" → apply() re-scales
  });

  window.addEventListener("resize", apply);
  frame.addEventListener("load", apply);
  apply();
})();
</script>
</body>
</html>
