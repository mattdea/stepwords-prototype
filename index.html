<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stepwords — Responsive Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Font Awesome: prefer the locally-installed font, fall back to CDN webfont ── */
  @font-face {
    font-family: "FA";
    font-style: normal;
    font-weight: 900;
    font-display: swap;
    src: local("Font Awesome 7 Free Solid"), local("Font Awesome 7 Pro Solid"),
         local("Font Awesome 6 Free Solid"), local("Font Awesome 6 Pro Solid"),
         local("FontAwesome6Free-Solid"), local("FontAwesome6Pro-Solid"),
         local("Font Awesome 5 Free Solid"), local("Font Awesome 5 Pro Solid"),
         local("FontAwesome5Free-Solid"),
         url("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/webfonts/fa-solid-900.woff2") format("woff2");
  }
  .fa {
    font-family: "FA"; font-weight: 900; font-style: normal; line-height: 1;
    display: inline-block; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100dvh;
    background: #1c1c1e;
    color: #e8e6e1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── toolbar with the version + device toggles ── */
  .toolbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 16px;
    flex-wrap: wrap;
  }
  .divider { width: 1px; height: 26px; background: rgba(255,255,255,.1); }
  .seg {
    display: inline-flex;
    height: var(--ctl-h);
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 13px;
    padding: 4px;
    gap: 2px;
  }
  .seg button {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: rgba(232,230,225,.55);
    font-family: inherit;
    cursor: pointer;
    padding: 0 18px;
    border-radius: 9px;
    line-height: 1.25;
    transition: background .15s, color .15s;
  }
  .seg button:hover { color: rgba(232,230,225,.85); }
  .seg button .lbl { font-size: 13px; font-weight: 500; }
  .seg button.active { background: #f4f2ea; color: #1c1c1e; }

  /* dimensions live in a hover tooltip (desktop only) instead of taking up space */
  .seg .dim {
    position: absolute; top: calc(100% + 9px); left: 50%; transform: translateX(-50%);
    background: #0e0e10; color: rgba(232,230,225,.92);
    font-size: 11px; font-variant-numeric: tabular-nums;
    padding: 5px 8px; border-radius: 7px; white-space: nowrap;
    border: 1px solid rgba(255,255,255,.1);
    opacity: 0; pointer-events: none; transition: opacity .14s ease; z-index: 60;
  }
  .seg button:hover .dim { opacity: 1; }

  /* ── action buttons (Expand / Open) ── */
  /* stretch to the toolbar row height so they match the segmented controls */
  .actions { display: inline-flex; gap: 8px; align-self: stretch; }
  .open-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.07);
    color: rgba(232,230,225,.7); font-family: inherit; font-size: 13px; font-weight: 500;
    height: var(--ctl-h); padding: 0 15px; border-radius: 13px; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .open-btn:hover { background: rgba(255,255,255,.1); color: rgba(232,230,225,.95); }
  .open-btn .fa { font-size: 13px; }

  /* ── stage holds the scaled device window ── */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 0 24px 28px;
  }
  .frame-wrap { position: relative; flex-shrink: 0; }
  #frame {
    position: absolute;
    top: 0;
    left: 0;
    border: none;
    transform-origin: top left;
    border-radius: 16px;
    box-shadow: 0 16px 60px rgba(0,0,0,.55);
    background: #1c1c1e;
  }

  /* ── expanded mode: a slim docked bar on top, version fills the rest ── */
  body.expanded .toolbar { display: none; }
  body.expanded #frame {
    position: fixed; top: var(--pv-h); left: 0;
    width: 100vw !important; height: calc(100dvh - var(--pv-h)) !important;
    transform: none !important;
    border-radius: 0; box-shadow: none;
  }

  /* docked preview bar — pushes the content down rather than covering it */
  :root { --pv-h: 38px; --ctl-h: 40px; }
  .preview-bar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--pv-h); z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px;
    background: rgba(24,24,26,.94);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,.08);   /* divider, no drop shadow at rest */
  }
  .preview-bar[hidden] { display: none; }
  .pv-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 28px; border-radius: 7px; border: none;
    background: transparent; color: rgba(232,230,225,.65); cursor: pointer;
    transition: background .15s, color .15s;
  }
  .pv-btn:hover { background: rgba(255,255,255,.12); color: rgba(232,230,225,1); }
  .pv-btn .fa { font-size: 14px; }

  /* ── mobile: compact, full-width, stacked ── */
  @media (max-width: 640px) {
    .toolbar { gap: 8px; padding: 10px; }
    .divider { display: none; }                 /* bars stack — no vertical rules */
    .seg { width: 100%; padding: 3px; }          /* stretch full width */
    .seg button { flex: 1; padding: 0 4px; }
    .seg button .lbl { font-size: 12px; }
    .seg .dim { display: none; }                 /* no dimension tooltips on mobile */
    .actions { width: 100%; }
    .actions .open-btn { flex: 1; justify-content: center; }
  }
</style>
</head>
<body>

  <div class="toolbar" id="toolbar">
    <div class="seg" id="ver">
      <button data-src="app-ben.html"><span class="lbl">Current</span></button>
      <button data-src="app.html" class="active"><span class="lbl">Lite</span></button>
      <button data-src="app-bare.html"><span class="lbl">Minimal</span></button>
      <button data-src="app-pixel.html"><span class="lbl">Pixel</span></button>
      <button data-src="app-chunky.html"><span class="lbl">Chunky</span></button>
    </div>
    <div class="divider"></div>
    <div class="seg" id="seg">
      <button data-w="1280" data-h="800" class="active"><span class="lbl">Desktop</span><span class="dim">1280 × 800</span></button>
      <button data-w="768"  data-h="1024"><span class="lbl">Tablet</span><span class="dim">768 × 1024</span></button>
      <button data-w="390"  data-h="844"><span class="lbl">Mobile</span><span class="dim">390 × 844</span></button>
    </div>
    <div class="divider"></div>
    <div class="actions">
      <button id="expand-btn" class="open-btn" title="Expand this version to fill the viewport">
        <i class="fa">&#xf065;</i> Expand
      </button>
      <button id="open-tab" class="open-btn" title="Open this version in a new tab (no device frame)">
        <i class="fa">&#xf08e;</i> Open
      </button>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="frame-wrap" id="wrap">
      <iframe id="frame" src="app.html" title="Stepwords"></iframe>
    </div>
  </div>

  <!-- slim docked preview bar — appears only in expanded mode -->
  <div class="preview-bar" id="preview-bar" hidden>
    <button class="pv-btn" id="pv-min" aria-label="Minimize" title="Minimize (Esc)"><i class="fa">&#xf066;</i></button>
    <button class="pv-btn" id="pv-open" aria-label="Open in new tab" title="Open in a new tab"><i class="fa">&#xf08e;</i></button>
  </div>

<script>
(function () {
  var stage = document.getElementById("stage");
  var wrap  = document.getElementById("wrap");
  var frame = document.getElementById("frame");
  var seg   = document.getElementById("seg");
  var ver   = document.getElementById("ver");
  var openBtn   = document.getElementById("open-tab");
  var expandBtn = document.getElementById("expand-btn");
  var previewBar = document.getElementById("preview-bar");
  var pvMin  = document.getElementById("pv-min");
  var pvOpen = document.getElementById("pv-open");
  var cur = { w: 1280, h: 800 };
  var curSrc = "app.html";   // the version currently in the frame

  function isExpanded() { return document.body.classList.contains("expanded"); }

  function apply() {
    if (isExpanded()) {
      // CSS (.expanded #frame) sizes it below the docked bar; clear inline overrides
      frame.style.transform = "";
      frame.style.width = "";
      frame.style.height = "";
      return;
    }
    // the iframe's CSS size IS its viewport, so the game's media queries respond to it
    frame.style.width  = cur.w + "px";
    frame.style.height = cur.h + "px";

    // scale down to fit the available stage (never scale up past 1:1)
    var availW = stage.clientWidth;
    var availH = stage.clientHeight;
    var scale = Math.min(1, availW / cur.w, availH / cur.h);

    frame.style.transform = "scale(" + scale + ")";
    // the wrapper takes the scaled footprint so the stage can center it
    wrap.style.width  = (cur.w * scale) + "px";
    wrap.style.height = (cur.h * scale) + "px";
  }

  function setExpanded(on) {
    document.body.classList.toggle("expanded", on);
    previewBar.hidden = !on;
    apply();
  }

  seg.addEventListener("click", function (e) {
    var btn = e.target.closest("button");
    if (!btn) return;
    var btns = seg.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
    btn.classList.add("active");
    cur = { w: parseInt(btn.dataset.w, 10), h: parseInt(btn.dataset.h, 10) };
    apply();
  });

  // version switcher — swap the iframe to a different version, keep the device size
  ver.addEventListener("click", function (e) {
    var btn = e.target.closest("button");
    if (!btn) return;
    var btns = ver.querySelectorAll("button");
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
    btn.classList.add("active");
    curSrc = btn.dataset.src;
    frame.src = curSrc;   // load() fires "load" → apply() re-scales
  });

  // open the current version's raw page (no device frame) in a new tab
  function openNewTab() { window.open(curSrc, "_blank", "noopener"); }
  openBtn.addEventListener("click", openNewTab);
  pvOpen.addEventListener("click", openNewTab);

  // expand / minimize
  expandBtn.addEventListener("click", function () { setExpanded(true); });
  pvMin.addEventListener("click", function () { setExpanded(false); });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && isExpanded()) setExpanded(false);
  });

  window.addEventListener("resize", apply);
  frame.addEventListener("load", apply);
  apply();
})();
</script>
</body>
</html>
